<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#071014"><link rel="manifest" href="manifest.webmanifest"><title>D-AUBE Nexus</title><style>body{margin:0;background:#071014;color:#effcff;font-family:system-ui}.app{max-width:760px;margin:auto;padding:20px}.panel{background:#0d1b24;border:1px solid #23404c;border-radius:24px;padding:22px;margin:14px 0}.orb{width:120px;height:120px;border-radius:50%;margin:24px auto;background:radial-gradient(circle at 35% 30%,#fff,#7ef9ff 18%,#6a5cff 35%,#071014 72%);box-shadow:0 0 48px #7ef9ff88,0 0 110px #b98cff55;animation:f 4s ease-in-out infinite}textarea{width:100%;min-height:110px;border-radius:16px;border:1px solid #23404c;background:#09141b;color:white;padding:14px;box-sizing:border-box}button{border:0;border-radius:14px;padding:12px 16px;font-weight:800;margin:8px 8px 0 0}.primary{background:#7ef9ff;color:#071014}.secondary{background:#172a35;color:#effcff}@keyframes f{50%{transform:translateY(-9px)}}</style></head><body><main class="app"><section class="panel"><small>LIVING COGNITIVE ECOSYSTEM</small><h1>D-AUBE Nexus</h1><div class="orb"></div><textarea id="q" placeholder="Giao nhiệm vụ cho Grand Steward..."></textarea><button class="primary" id="run">Launch Quest</button><button class="secondary" id="install">Cài Web App</button><p id="log">Ready. Web App tự cập nhật khi mở.</p></section></main><script>let p;addEventListener('beforeinstallprompt',e=>{e.preventDefault();p=e});install.onclick=async()=>{if(p){p.prompt();await p.userChoice;p=null}else alert('Mở menu trình duyệt và chọn Thêm vào màn hình chính hoặc Cài ứng dụng')};run.onclick=()=>{let v=q.value.trim();if(v)log.textContent='Planner → Builder → Doctor → '+v};if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');</script></body></html>
