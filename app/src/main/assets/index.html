<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#071014"><title>D-AUBE Nexus</title><style>body{margin:0;background:radial-gradient(circle at 20% 0,#163548,#071014 48%);color:#effcff;font-family:system-ui;min-height:100vh}.app{max-width:760px;margin:auto;padding:18px}.panel{background:rgba(13,27,36,.88);border:1px solid #23404c;border-radius:24px;padding:20px;margin:12px 0}.top{display:flex;justify-content:space-between;align-items:center}.status{font-size:11px;color:#7ef9ff}.orb{width:120px;height:120px;border-radius:50%;margin:24px auto;background:radial-gradient(circle at 35% 30%,#fff,#7ef9ff 18%,#6a5cff 35%,#071014 72%);box-shadow:0 0 42px #7ef9ff88,0 0 90px #b98cff55;animation:f 4s ease-in-out infinite}textarea{width:100%;min-height:110px;border-radius:16px;border:1px solid #23404c;background:#09141b;color:white;padding:14px;box-sizing:border-box}button{padding:12px 16px;border:0;border-radius:14px;font-weight:800;margin:8px 8px 0 0}.primary{background:#7ef9ff;color:#071014}.secondary{background:#172a35;color:#effcff}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{padding:14px}.log{white-space:pre-wrap;font:12px/1.6 ui-monospace,monospace}@keyframes f{50%{transform:translateY(-9px)}}</style></head><body><main class="app"><section class="panel top"><strong>D-AUBE NEXUS</strong><span class="status" id="status">● LOCAL READY</span></section><section class="panel"><small>LOCAL-FIRST COGNITIVE APP</small><h1>Grand Steward is awake.</h1><div class="orb" id="orb"></div><textarea id="q" placeholder="Giao nhiệm vụ cho Grand Steward..."></textarea><button class="primary" id="run">Launch Quest</button><button class="secondary" id="doctor">Doctor</button></section><section class="grid"><div class="panel card"><strong>AI Council</strong><small>Planner · Builder · Doctor</small></div><div class="panel card"><strong>Ecosystem</strong><small>Web · Android · Windows</small></div></section><section class="panel log" id="log">Ready. App opens locally and no longer depends on GitHub Pages.</section></main><script>const q=document.getElementById('q'),log=document.getElementById('log'),status=document.getElementById('status'),orb=document.getElementById('orb');function run(v){if(!v)return;status.textContent='● WORKING';orb.style.animationDuration='1.2s';log.textContent='Quest received: '+v+'\nPlanner → decomposing\nBuilder → preparing\nDoctor → validating\nObserver → saving locally';localStorage.setItem('daube-last-quest',v);setTimeout(()=>{status.textContent='● LOCAL READY';orb.style.animationDuration='4s'},1600)}document.getElementById('run').onclick=()=>run(q.value.trim());document.getElementById('doctor').onclick=()=>run('Doctor scan toàn hệ thống');</script></body></html>
