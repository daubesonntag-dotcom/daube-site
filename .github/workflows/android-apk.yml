name: Build D-AUBE Android APK

on:
  pull_request:
    paths: ["app/**", "build.gradle", "settings.gradle", ".github/workflows/android-apk.yml"]
  push:
    branches: [main]
    paths: ["app/**", "build.gradle", "settings.gradle", ".github/workflows/android-apk.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Select local first launcher
        run: sed -i 's/\.MainActivity/\.LocalMainActivity/' app/src/main/AndroidManifest.xml
      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon
      - name: Package
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/DAUBE-Nexus-Local-First.apk
          sha256sum release/DAUBE-Nexus-Local-First.apk > release/DAUBE-Nexus-Local-First.sha256
          test -s release/DAUBE-Nexus-Local-First.apk
      - uses: actions/upload-artifact@v4
        with:
          name: DAUBE-Nexus-Local-First-APK
          path: release/*
          if-no-files-found: error
      - name: Publish public release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view nexus-local-first >/dev/null 2>&1 && gh release delete nexus-local-first --cleanup-tag --yes || true
          gh release create nexus-local-first release/DAUBE-Nexus-Local-First.apk release/DAUBE-Nexus-Local-First.sha256 --title "D-AUBE Nexus Local First" --notes "Opens the bundled app immediately and does not depend on GitHub Pages." --latest
