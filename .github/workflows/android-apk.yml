name: Build D-AUBE Android APK

on:
  pull_request:
    paths: ["app/**", "build.gradle", "settings.gradle", ".github/workflows/android-apk.yml"]
  push:
    branches: [main]
    paths: ["app/**", "build.gradle", "settings.gradle", ".github/workflows/android-apk.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon
      - name: Package
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/DAUBE-Nexus.apk
          sha256sum release/DAUBE-Nexus.apk > release/DAUBE-Nexus.sha256
          test -s release/DAUBE-Nexus.apk
      - uses: actions/upload-artifact@v4
        with:
          name: DAUBE-Nexus-APK
          path: release/*
          if-no-files-found: error
      - name: Publish public release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view nexus-latest >/dev/null 2>&1 && gh release delete nexus-latest --cleanup-tag --yes || true
          gh release create nexus-latest release/DAUBE-Nexus.apk release/DAUBE-Nexus.sha256 --title "D-AUBE Nexus Android" --notes "Public Android shell with HTTPS ecosystem loading and local offline fallback." --latest
