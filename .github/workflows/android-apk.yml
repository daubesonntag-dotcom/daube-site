name: Build D-AUBE Android APK

on:
  pull_request:
    paths: ["app/**", "build.gradle", "settings.gradle", ".github/workflows/android-apk.yml"]
  push:
    branches: [main]
    paths: ["app/**", "build.gradle", "settings.gradle", ".github/workflows/android-apk.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Prepare app
        run: |
          sed -i 's/\.MainActivity/\.LocalMainActivity/' app/src/main/AndroidManifest.xml
          sed -i 's#</body>#<script src="backend-client.js"></script></body>#' app/src/main/assets/index.html
      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon
      - name: Package
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/DAUBE-Nexus-Interactive.apk
          sha256sum release/DAUBE-Nexus-Interactive.apk > release/DAUBE-Nexus-Interactive.sha256
          test -s release/DAUBE-Nexus-Interactive.apk
      - uses: actions/upload-artifact@v4
        with:
          name: DAUBE-Nexus-Interactive-APK
          path: release/*
          if-no-files-found: error
